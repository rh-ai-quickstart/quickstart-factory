# Sync and validate skills under core/skills/.
# - PRs: validate layout + sync-clients smoke test (no commits).
# - Push to main/dev (post-merge), schedule, manual: also sync rhdp-skills-marketplace into core/skills/marketplace/.
name: Sync Skills

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'core/skills/**'
      - 'core/scripts/**'
      - '.github/workflows/sync-skills.yaml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'core/skills/**'
      - 'core/scripts/**'
      - '.github/workflows/sync-skills.yaml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-skills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Install skill-validator
        run: |
          go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@v1.5.6
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          skill-validator --version

      - name: Validate core/skills structure (layout)
        run: bash core/scripts/validate-skills.sh

      - name: Validate skills against agentskills.io spec
        run: bash core/scripts/validate-skills-spec.sh

      - name: Sync skills to AI client directories (smoke test)
        run: |
          bash core/scripts/sync-clients.sh
          expected=$(find core/skills -name SKILL.md | wc -l | tr -d ' ')
          linked=$(find .cursor/skills -maxdepth 1 -type l 2>/dev/null | wc -l | tr -d ' ')
          echo "Skills: $expected  Symlinks: $linked"
          if [ "$expected" != "$linked" ]; then
            echo "ERROR: symlink count ($linked) does not match SKILL.md count ($expected)"
            exit 1
          fi

  sync-marketplace:
    runs-on: ubuntu-latest
    needs: validate
    # Run after merge to main/dev, nightly, or manual — not on pull_request
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Sync showroom skills from rhdp-skills-marketplace
        env:
          MARKETPLACE_REPO: rh-ai-quickstart/rhdp-skills-marketplace
        run: |
          set -euo pipefail
          DEST="core/skills/marketplace"
          mkdir -p "$DEST"
          find "$DEST" -maxdepth 1 -type d -name 'showroom*' -exec rm -rf {} +

          if ! git clone --depth 1 "https://github.com/${MARKETPLACE_REPO}.git" temp-repo; then
            echo "::warning::Could not clone ${MARKETPLACE_REPO} (private or missing). Skipping marketplace sync."
            exit 0
          fi

          shopt -s nullglob
          copied=0
          for src in temp-repo/skills/showroom*/; do
            name=$(basename "$src")
            rm -rf "$DEST/$name"
            cp -r "$src" "$DEST/$name"
            copied=$((copied + 1))
            echo "Copied $name -> $DEST/$name"
          done
          rm -rf temp-repo

          if [ "$copied" -eq 0 ]; then
            echo "No showroom* skills found in marketplace repo; nothing to commit."
            exit 0
          fi

          bash core/scripts/validate-skills.sh
          bash core/scripts/validate-skills-spec.sh

      - name: Commit and push marketplace sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add core/skills/marketplace/
          if git diff --staged --quiet; then
            echo "No marketplace skill changes."
            exit 0
          fi
          git commit -m "chore: sync showroom skills from rhdp-skills-marketplace [skip ci]"
          git push
